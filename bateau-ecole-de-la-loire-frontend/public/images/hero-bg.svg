<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="170" stroke="white" stroke-width="12"/>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="40" stroke="white" stroke-width="10"/>

  <!-- 8 spokes -->
  <line x1="200" y1="30" x2="200" y2="160" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="200" y2="370" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="200" x2="160" y2="200" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="200" x2="370" y2="200" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Diagonal spokes -->
  <line x1="80" y1="80" x2="172" y2="172" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="228" y1="228" x2="320" y2="320" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="80" x2="228" y2="172" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="172" y1="228" x2="80" y2="320" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Handle knobs -->
  <circle cx="200" cy="30" r="14" fill="white"/>
  <circle cx="200" cy="370" r="14" fill="white"/>
  <circle cx="30" cy="200" r="14" fill="white"/>
  <circle cx="370" cy="200" r="14" fill="white"/>
  <circle cx="80" cy="80" r="14" fill="white"/>
  <circle cx="320" cy="320" r="14" fill="white"/>
  <circle cx="320" cy="80" r="14" fill="white"/>
  <circle cx="80" cy="320" r="14" fill="white"/>

  <!-- Center cap -->
  <circle cx="200" cy="200" r="16" fill="white"/>
</svg>
